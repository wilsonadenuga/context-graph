services:
  neo4j:
    image: neo4j:5.26.0-enterprise
    container_name: context-graph-neo4j
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    platform: linux/x86_64
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: context-graph-backend
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: context-graph-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - next_data:/app/.next
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - .next/

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  next_data:
